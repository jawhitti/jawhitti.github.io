<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"><title>STARLOCK</title>
<style>
 *{box-sizing:border-box;}
 body{font-family:'Trebuchet MS',system-ui,sans-serif;margin:0;min-height:100vh;
   background:radial-gradient(1200px 800px at 50% -10%,#1b2a4a,#070b14 70%);color:#cde3ff;
   display:flex;flex-direction:column;align-items:center;padding:22px;transition:background .15s;}
 body.dead{background:radial-gradient(1200px 800px at 50% -10%,#5a1620,#1a0608 70%);}
 #hud{display:flex;gap:12px;margin:0 0 12px;font-family:'Courier New',monospace;}
 .hudbox{background:#0a1018;border:1px solid #243954;border-radius:8px;padding:6px 13px;
   font-size:19px;letter-spacing:1px;color:#ffce42;text-shadow:0 0 10px rgba(255,206,66,.55);}
 .hudbox b{font-weight:700;}
 body.dead .hudbox{color:#ff6b78;text-shadow:0 0 10px rgba(255,107,120,.6);border-color:#5a2230;}
 h1{letter-spacing:5px;font-size:22px;margin:2px 0 2px;color:#8fd0ff;text-shadow:0 0 14px #2f6fb0;}
 #pnum{font-size:13px;letter-spacing:1px;color:#5e7da3;text-shadow:none;}
 #hint{color:#5e7da3;font-size:13px;margin-bottom:18px;text-align:center;max-width:440px;}
 #stage{position:relative;margin:6px 0 8px;}
 body.dead #stage{animation:shake .4s;}
 @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}
   40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
 .room{position:absolute;border-radius:16px;background:linear-gradient(160deg,#16243c,#0e1726);
   border:2px solid #243954;box-shadow:inset 0 0 26px rgba(0,0,0,.55);cursor:default;
   transition:border-color .2s, box-shadow .2s;}
 .room.reach{cursor:pointer;border-color:#37e0a0;box-shadow:inset 0 0 26px rgba(0,0,0,.4),0 0 16px rgba(55,224,160,.45);}
 .room.reach:hover{background:linear-gradient(160deg,#1b3050,#10203a);}
 .rlabel{position:absolute;top:6px;left:9px;font-size:11px;color:#33506f;letter-spacing:1px;}
 .goal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;
   filter:drop-shadow(0 0 8px #d9a14a);}
 .door{position:absolute;overflow:hidden;border-radius:5px;background:#05080e;}
 .panel{position:absolute;background:linear-gradient(180deg,#6d8198,#3d4d63);
   border:1px solid #8aa3bd;transition:transform .38s cubic-bezier(.55,0,.25,1);}
 .hdoor .panel{left:0;width:100%;height:51%;}
 .hdoor .p1{top:0;border-radius:0 0 4px 4px;} .hdoor .p2{bottom:0;border-radius:4px 4px 0 0;}
 .hdoor.open .p1{transform:translateY(-104%);} .hdoor.open .p2{transform:translateY(104%);}
 .vdoor .panel{top:0;height:100%;width:51%;}
 .vdoor .p1{left:0;border-radius:0 4px 4px 0;} .vdoor .p2{right:0;border-radius:4px 0 0 4px;}
 .vdoor.open .p1{transform:translateX(-104%);} .vdoor.open .p2{transform:translateX(104%);}
 .avatar{position:absolute;font-size:42px;transform:translate(-50%,-50%);
   transition:left .26s ease, top .26s ease;filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));pointer-events:none;z-index:5;}
 #status{min-height:24px;font-size:16px;margin:8px 0 16px;font-weight:600;}
 .win{color:#37e0a0;text-shadow:0 0 12px #1c7a52;} .die{color:#ff6b78;text-shadow:0 0 12px #a02029;}
 #pad{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:520px;min-height:84px;align-items:center;}
 .bigbtn{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;
   box-shadow:0 7px 0 rgba(0,0,0,.35),inset 0 5px 10px rgba(255,255,255,.35),inset 0 -8px 12px rgba(0,0,0,.3);
   transition:transform .07s, box-shadow .07s;position:relative;}
 .bigbtn::after{content:"";position:absolute;top:13px;left:16px;width:22px;height:14px;border-radius:50%;
   background:rgba(255,255,255,.5);filter:blur(2px);}
 .bigbtn:active{transform:translateY(6px);box-shadow:0 1px 0 rgba(0,0,0,.35),inset 0 5px 10px rgba(255,255,255,.3),inset 0 -8px 12px rgba(0,0,0,.3);}
 .bigbtn:disabled{opacity:.35;cursor:default;}
 .botbtn{padding:11px 18px;border-radius:10px;border:1px solid #3a4a5a;background:#1a2433;color:#9fd0ff;
   font-size:15px;cursor:pointer;font-weight:600;}
 .botbtn:hover{background:#22304a;}
 #ctrls{margin-top:14px;display:flex;gap:18px;}
 #ctrls span{font-size:13px;color:#5e7da3;cursor:pointer;}
 #ctrls span:hover{color:#9fd0ff;}
 @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 26px rgba(0,0,0,.4)}
   50%{box-shadow:0 0 22px 5px rgba(255,206,66,.85)}}
 .hintpulse{animation:hintpulse 1.45s ease 2;}
 #pad .empty{color:#4a688c;font-size:14px;}
 #reset{margin-top:14px;font-size:12px;color:#3f5f80;cursor:pointer;text-decoration:underline;}
 #startov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
   background:rgba(7,11,20,.8);border-radius:16px;z-index:20;}
 .startbtn{padding:15px 32px;font-size:23px;font-weight:800;letter-spacing:3px;border:none;border-radius:12px;
   background:linear-gradient(160deg,#37e0a0,#1c9c6e);color:#04150e;cursor:pointer;
   box-shadow:0 7px 0 #0e5a3e,0 0 26px rgba(55,224,160,.5);transition:transform .07s,box-shadow .07s;}
 .startbtn:active{transform:translateY(5px);box-shadow:0 2px 0 #0e5a3e,0 0 26px rgba(55,224,160,.5);}
 #winov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
   background:rgba(7,11,20,.88);border-radius:16px;z-index:25;}
 .wincard{text-align:center;padding:10px;}
 .wintitle{font-size:30px;font-weight:800;color:#37e0a0;text-shadow:0 0 16px #1c7a52;letter-spacing:2px;}
 .winstars{font-size:34px;margin:4px 0 2px;color:#ffce42;letter-spacing:5px;text-shadow:0 0 10px rgba(255,206,66,.5);}
 .winsub{color:#9fd0ff;font-size:14px;margin-bottom:9px;}
 .winstreak{color:#ffb547;font-size:15px;font-weight:600;margin-bottom:14px;}
 .winbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
 #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a2433;color:#cfe;
   border:1px solid #3a4a5a;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .3s;
   pointer-events:none;font-size:14px;z-index:40;}

let BOARD=null, TRAPS=null, dayIdx=0, isToday=true;
const NC = BANK[0].nCols, NR = BANK[0].nRows;
function absToday(){ const n=new Date(), t=new Date(n.getFullYear(),n.getMonth(),n.getDate()),
   e=new Date(EPOCH[0],EPOCH[1],EPOCH[2]); return Math.round((t-e)/86400000); }
function todayIdx(){ return ((absToday()%BANK.length)+BANK.length)%BANK.length; }
function stats(){ try{ return JSON.parse(localStorage.getItem('starlock'))||{played:0,cur:0,max:0,last:-2}; }
   catch(e){ return {played:0,cur:0,max:0,last:-2}; } }
function saveStats(s){ try{ localStorage.setItem('starlock',JSON.stringify(s)); }catch(e){} }
function recordWin(){ const s=stats(), day=absToday(); if(s.last===day) return;   // once per day
   s.cur=(s.last===day-1)?s.cur+1:1; s.last=day; s.played+=1; if(s.cur>s.max)s.max=s.cur;
   s.run=enc(log); s.moves=moves; s.retries=retries; s.ms=(winTime||performance.now())-startTime; s.stars=rating();
   saveStats(s); }
function showStats(){ const s=stats(); flash('🔥 streak '+s.cur+' · best '+s.max+' · '+s.played+' solved'); }
function showSolved(){ const s=stats(), k=s.stars||1;
   winov.innerHTML='<div class="wincard"><div class="wintitle" style="color:#8fd0ff;text-shadow:0 0 16px #2f6fb0">SOLVED #'+dayIdx+'</div>'+
     '<div class="winstars">'+'★'.repeat(k)+'☆'.repeat(3-k)+'</div>'+
     '<div class="winsub">'+s.moves+' moves &middot; ⏱ '+fmt(s.ms)+(s.retries?' &middot; '+s.retries+' deaths':'')+'</div>'+
     '<div class="winstreak">🔥 streak '+s.cur+' &middot; best '+s.max+' &middot; '+s.played+' solved</div>'+
     '<div class="winsub">next puzzle in <span id="cd">--:--:--</span></div>'+
     '<div class="winbtns"><button class="botbtn" onclick="shareSolved()">📤 share</button>'+
     '<button class="botbtn" onclick="watchMine()">▶ your run</button>'+
     '<button class="botbtn" onclick="playAnyway()">practice</button></div></div>';
   winov.style.display='flex'; tickCD(); if(cdTimer)clearInterval(cdTimer); cdTimer=setInterval(tickCD,1000); }
function tickCD(){ const el=document.getElementById('cd'); if(!el)return;
   const n=new Date(), mid=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1); let z=Math.max(0,Math.floor((mid-n)/1000));
   const h=Math.floor(z/3600), m=Math.floor(z%3600/60), x=z%60;
   el.textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(x<10?'0':'')+x; }
function watchMine(){ if(cdTimer){clearInterval(cdTimer);cdTimer=null;} solved=false; startPlay(dec(stats().run||''),'your solve',false); }
function playAnyway(){ if(cdTimer){clearInterval(cdTimer);cdTimer=null;} solved=false; reset(true); }
function shareSolved(){ const s=stats(), k=s.stars||1; const url=location.origin+location.pathname+'#d='+dayIdx+'&r='+(s.run||'');
   const txt='STARLOCK #'+dayIdx+' — escaped in '+s.moves+' moves, '+s.retries+' deaths, '+fmt(s.ms)+'  '+'★'.repeat(k)+'☆'.repeat(3-k);
   if(navigator.share){ navigator.share({title:'STARLOCK',text:txt,url:url}).catch(()=>{}); }
   else if(navigator.clipboard){ navigator.clipboard.writeText(txt+'\n'+url).then(()=>flash('result + replay link copied'),()=>flash('copy blocked — needs https')); }
   else flash('clipboard unavailable'); }
const G_RATIO = 0.42;
const VW = Math.min((window.innerWidth||400) - 44, 460);          // fit the screen
const R = Math.max(60, Math.round(VW / (NC + G_RATIO*(NC-1))));
const G = Math.round(R * G_RATIO);
const COLORS = ['#ff5a5f','#3fa9f5','#ffce42','#4ad991','#b06bff','#ff9442','#22d3c5',
                '#ff6fae','#7ad13a','#5b7bff','#ff7b39','#19c0a8','#e34bd9','#46e0c0','#9ad62f','#5ad1ff'];
let rooms=[], doorEls={}, avatar=null, overlay=null, winov=null, started=false;

function fmt(ms){ const s=ms/1000, m=Math.floor(s/60), r=s-m*60; return m+':'+(r<10?'0':'')+r.toFixed(1); }
function hud(){ document.getElementById('retries').textContent=retries;
   document.getElementById('clock').textContent =
     startTime==null ? '0:00.0' : fmt((winTime||performance.now())-startTime); }
function startClock(){ if(startTime==null){ startTime=performance.now(); timerId=setInterval(hud,100); } }
function label(r){ return String.fromCharCode(65+Math.floor(r/NC)) + (r%NC+1); }
function roomXY(r){ return [ (r%NC)*(R+G), Math.floor(r/NC)*(R+G) ]; }
function doorIdx(a,b){ for(let i=0;i<BOARD.doors.length;i++){const d=BOARD.doors[i];
   if((d[0]==a&&d[1]==b)||(d[0]==b&&d[1]==a))return i;} return -1; }
function maskInt(){ let m=0; for(let i=0;i<doors.length;i++) if(doors[i]) m+=(1<<i); return m; }
function stateKey(){ return room*BOARD.keyMul + maskInt(); }
function canWalk(to){ const di=doorIdx(room,to); return di>=0 && doors[di]; }

function build(){
  const stage=document.getElementById('stage');
  stage.style.width=(NC*R+(NC-1)*G)+'px'; stage.style.height=(NR*R+(NR-1)*G)+'px';
  for(let r=0;r<NR*NC;r++){ const [x,y]=roomXY(r); const el=document.createElement('div');
     el.className='room'; el.style.left=x+'px'; el.style.top=y+'px'; el.style.width=R+'px'; el.style.height=R+'px';
     const lab=document.createElement('div'); lab.className='rlabel'; lab.textContent=label(r); el.appendChild(lab);
     if(r==BOARD.goal){ const g=document.createElement('div'); g.className='goal'; g.textContent='🏁';
        g.style.fontSize=Math.round(R*0.4)+'px'; el.appendChild(g); }
     el.onclick=()=>walk(r); stage.appendChild(el); rooms[r]=el; }
  BOARD.doors.forEach((pair,di)=>{ const [a,b]=pair; const [ax,ay]=roomXY(a);
     const horizontal=(b-a)==1; const el=document.createElement('div');
     el.className='door '+(horizontal?'hdoor':'vdoor');
     if(horizontal){ el.style.left=(ax+R)+'px'; el.style.top=ay+'px'; el.style.width=G+'px'; el.style.height=R+'px'; }
     else { el.style.left=ax+'px'; el.style.top=(ay+R)+'px'; el.style.width=R+'px'; el.style.height=G+'px'; }
     el.innerHTML='<div class="panel p1"></div><div class="panel p2"></div>';
     stage.appendChild(el); doorEls[di]=el; });
  avatar=document.createElement('div'); avatar.className='avatar'; avatar.textContent='🧑‍🚀';
  avatar.style.fontSize=Math.round(R*0.42)+'px'; stage.appendChild(avatar);
  overlay=document.createElement('div'); overlay.id='startov';
  overlay.innerHTML='<button class="startbtn" onclick="begin()">START</button>';
  stage.appendChild(overlay);
  winov=document.createElement('div'); winov.id='winov'; stage.appendChild(winov);
}

function update(){
  BOARD.doors.forEach((p,di)=> doorEls[di].classList.toggle('open', doors[di]) );
  const [x,y]=roomXY(room); avatar.style.left=(x+R/2)+'px'; avatar.style.top=(y+R/2)+'px';
  rooms.forEach((el,r)=>{ el.classList.toggle('reach', started&&!done&&!dead&&!botMode&&!botFin&&!solved&&canWalk(r)); });
  document.body.classList.toggle('dead', !!dead);
  overlay.style.display = (started||botMode||botFin||solved) ? 'none' : 'flex';
  const st=document.getElementById('status');
  if(botMode) st.innerHTML='<span class="win">▶ watching '+playLabel+'…</span>';
  else if(botFin) st.innerHTML = sharedReplay
     ? '<span class="win">▶ shared run — '+playArr.length+' moves &middot; <u style="cursor:pointer" onclick="freshGame()">play it yourself</u></span>'
     : '<span class="win">▶ '+playLabel+' — '+playArr.length+' moves &middot; <u style="cursor:pointer" onclick="restart()">restart</u></span>';
  else if(dead) st.innerHTML='<span class="die">☠ TRAPPED — you die.</span>';
  else if(done||solved) st.textContent='';
  else st.textContent = started ? 'moves '+moves : 'press START to begin';
  if(!solved){
    if(done && !botMode && !botFin){ const k=rating(); const s=stats();
       winov.innerHTML='<div class="wincard"><div class="wintitle">★ ESCAPED</div>'+
          '<div class="winstars">'+'★'.repeat(k)+'☆'.repeat(3-k)+'</div>'+
          '<div class="winsub">'+moves+' moves &middot; par '+BOARD.par+' &middot; ⏱ '+fmt((winTime||performance.now())-startTime)+'</div>'+
          (isToday?'<div class="winstreak">🔥 streak '+s.cur+' &middot; best '+s.max+' &middot; '+s.played+' solved</div>':'')+
          '<div class="winbtns"><button class="botbtn" onclick="share()">📤 share</button>'+
          '<button class="botbtn" onclick="bot()">🤖 watch the bot ('+BOARD.par+')</button>'+
          '<button class="botbtn" onclick="restart()">↻ play again</button></div></div>';
       winov.style.display='flex';
    } else winov.style.display='none';
  }
  const pad=document.getElementById('pad'); pad.innerHTML='';
  if(!done && !dead && !botMode && !botFin && !solved){ let any=false;
     BOARD.buttons.forEach((b,bi)=>{ if(b.room!=room) return; any=true;
        const el=document.createElement('button'); el.className='bigbtn'; el.dataset.bi=bi;

        el.disabled=!started; el.onclick=()=>press(bi); pad.appendChild(el); });
     if(!any) pad.innerHTML='<span class="empty">no controls in this room — find another way</span>'; }
  hud();
}

function walk(to){ if(!started||done||dead||botMode||botFin||!canWalk(to))return; room=to; moves++; log.push(['walk',to]);
   if(room==BOARD.goal){ done=true; winTime=performance.now(); if(timerId){clearInterval(timerId);timerId=null;} if(isToday) recordWin(); update(); return; }
   if(checkDeath())return; update(); }
function press(bi){ if(!started||done||dead||botMode||botFin)return; for(const w of BOARD.buttons[bi].wires){
     if(w.e=='open')doors[w.d]=true; else if(w.e=='close')doors[w.d]=false; else doors[w.d]=!doors[w.d]; }
   moves++; log.push(['press',bi]); if(checkDeath())return; update(); }
function checkDeath(){ if(!done && !dead && TRAPS.has(stateKey())){ dead=true; update();
   setTimeout(()=>{ retries++; reset(false); }, 1400); return true; } return false; }
function reset(fresh){ room=BOARD.start; doors=BOARD.initDoors.slice(); moves=0; log=[]; done=false; dead=false; botMode=false; botFin=false; stopBot();

function startPlay(arr,label,shared){ stopBot(); playArr=arr; playIdx=0; playLabel=label; sharedReplay=!!shared;

   else if(navigator.clipboard){ navigator.clipboard.writeText(txt+'\n'+url).then(()=>flash('result + replay link copied'),()=>flash('copy blocked — needs https')); }
   else flash('clipboard unavailable'); }
function giveup(){ if(started && !done && !dead && !botMode && !botFin) bot(); }
function solveFrom(r0,m0){ const par={}, K=BOARD.keyMul; par[r0*K+m0]=null; const Q=[[r0,m0]]; let h=0;
   while(h<Q.length){ const pr=Q[h++], rr=pr[0], mm=pr[1];
      if(rr==BOARD.goal){ const acts=[]; let k=rr*K+mm; while(par[k]){ acts.push(par[k][1]); k=par[k][0]; } acts.reverse(); return acts; }
      for(let i=0;i<BOARD.doors.length;i++){ const d=BOARD.doors[i], nb=d[0]==rr?d[1]:(d[1]==rr?d[0]:-1);
         if(nb>=0 && ((mm>>i)&1)){ const nk=nb*K+mm; if(!(nk in par)){ par[nk]=[rr*K+mm,['walk',nb]]; Q.push([nb,mm]); } } }
      BOARD.buttons.forEach((b,bi)=>{ if(b.room!=rr)return; let nm=mm;
         for(const w of b.wires){ if(w.e=='open')nm|=(1<<w.d); else if(w.e=='close')nm&=~(1<<w.d); else nm^=(1<<w.d); }
         const nk=rr*K+nm; if(!(nk in par)){ par[nk]=[rr*K+mm,['press',bi]]; Q.push([rr,nm]); } }); }
   return null; }
function hint(){ if(!started||done||dead||botMode||botFin)return; const a=solveFrom(room,maskInt()); if(!a||!a.length)return;
   const mv=a[0]; const el = mv[0]=='walk' ? rooms[mv[1]]
      : [...document.querySelectorAll('#pad .bigbtn')].find(x=>+x.dataset.bi==mv[1]);
   if(el){ el.classList.add('hintpulse'); setTimeout(()=>el.classList.remove('hintpulse'),2900); } }

function move(dr,dc){ const rr=Math.floor(room/NC), cc=room%NC, nr=rr+dr, nc=cc+dc;
   if(nr<0||nr>=NR||nc<0||nc>=NC) return; walk(nr*NC+nc); }   // walk() checks the door is open
document.addEventListener('keydown', e=>{ const k=e.key.toLowerCase(); let h=true;
   if(k=='arrowup'||k=='w') move(-1,0); else if(k=='arrowdown'||k=='s') move(1,0);
   else if(k=='arrowleft'||k=='a') move(0,-1); else if(k=='arrowright'||k=='d') move(0,1);
   else h=false; if(h) e.preventDefault(); });
const dm=location.hash.match(/d=(\d+)/), rm=location.hash.match(/r=([A-Za-z]+)/);
isToday = !dm;
dayIdx = dm ? (((+dm[1])%BANK.length)+BANK.length)%BANK.length : todayIdx();
BOARD = BANK[dayIdx]; TRAPS = new Set(BOARD.traps);
document.getElementById('pnum').textContent='#'+dayIdx;
build();
if(rm){ reset(true); startPlay(dec(rm[1]),'a shared run',true); }
else if(isToday && stats().last===absToday()){ solved=true; reset(true); showSolved(); }
else reset(true);
</script></body></html>
